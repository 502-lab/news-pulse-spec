      tags:
      - "Device Tokens"
      summary: "디바이스 토큰 삭제"
      description: "등록된 FCM 디바이스 토큰을 삭제한다. 본인 토큰만 삭제 가능 — 타인 토큰 접근 시 404 반환."
      operationId: "delete_1"
      parameters:
      - name: "tokenId"
        in: "path"
        description: "삭제할 토큰 ID"
        required: true
        schema:
          type: "integer"
          format: "int64"
      responses:
        "204":
          description: "삭제 완료"
        "401":
          description: "미인증"
