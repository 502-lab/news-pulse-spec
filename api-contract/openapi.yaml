        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "404":
          description: "TTS 없음"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
    post:
      tags:
      - "TTS"
      summary: "기사 TTS 요청"
      description: "기사 요약을 지정 음성으로 TTS 변환 요청. 이미 READY이면 200, 처리 중이거나 새 요청이면 202.\
        \ FAILED 상태는 자동으로 PENDING으로 리셋 후 재처리. 멱등 — 중복 요청 안전."
      operationId: "requestTts"
