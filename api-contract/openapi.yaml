          description: "이미 READY 상태"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "202":
          description: "PENDING/PROCESSING 처리 대기 중"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "403":
          description: "권한 없음"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "404":
