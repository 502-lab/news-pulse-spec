openapi: 3.1.0
info:
  title: News Pulse API
  version: 2.0.0
  description: |
    News Pulse 백엔드 전체 API Contract.
    spec 001 (뉴스 피드·기사·파이프라인) + spec 002 (계정·인증·온보딩·인가) 통합본.

    **인증**: `Authorization: Bearer {accessToken}` 헤더 전송.
    액세스 토큰 TTL 1h, 리프레시 토큰 TTL 30d (Rotation 적용).
    JWT claim: `sub`=accountId, `role`=USER|ADMIN, `emailVerified`=boolean.

    **공개 엔드포인트** (토큰 불필요):
    회원가입·로그인·토큰갱신·소셜OAuth·비밀번호재설정·약관목록·헬스체크.

    **이메일 인증 게이팅**: `/api/v1/me/**` 이하 엔드포인트는 `emailVerified=true` 필수.
    미인증 계정은 403 (code=EMAIL_NOT_VERIFIED).

    **에러 응답**: 모든 에러는 ErrorResponse 형식. 모든 시각은 UTC ISO-8601.

servers:
  - url: http://localhost:8080
    description: 로컬 개발
  - url: https://api.newsift.io
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: 이메일 회원가입·로그인·토큰 관리
  - name: Auth - Social
    description: 소셜(카카오·구글·애플) OAuth
  - name: Auth - Email Verification
    description: 이메일 인증 코드 발송·검증
  - name: Auth - Password Reset
    description: 비밀번호 재설정 3단계 흐름
  - name: Me
    description: 내 계정·프로필·설정 조회·수정
  - name: Me - Onboarding
    description: 온보딩 데이터 제출·상태 조회
  - name: Terms
    description: 약관 버전 조회·동의 이력·재동의
  - name: Feed
    description: 뉴스 피드 목록 조회
  - name: Articles
    description: 기사 상세 조회
  - name: Admin
    description: 관리자 전용 (ADMIN 역할 필요)

paths:

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTH — Public
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입
      operationId: signup
      description: |
        이메일+비밀번호로 계정을 생성한다. 필수 약관 동의 및 연령 동의 필수.
        성공 시 액세스·리프레시 토큰을 반환한다 (이메일 미인증 상태로 발급).
        계정 생성 후 인증 코드 발송 시도 — 발송 실패 시 계정은 유지되고 verificationEmailSent=false 반환 (항상 201).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 계정 생성 완료
          content:
            application/json:
              schema:
                type: object
                required: [account, tokens, verificationEmailSent]
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
                  verificationEmailSent:
                    type: boolean
                    description: 이메일 인증 코드 발송 성공 여부. false여도 계정은 생성됨. 재발송은 /auth/email-verification/request 이용.
        '409':
          description: 이메일 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 유효성 검사 실패 (비밀번호 정책·약관 미동의·연령 미달)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인
      operationId: login
      description: |
        이메일+비밀번호로 인증 후 토큰 쌍을 반환한다.
        연속 5회 실패 시 계정 잠금 (30분 자동 해제).
        잘못된 자격증명·계정 미존재·계정 잠금은 동일 401 반환 (계정 열거 방지).
        소셜 전용 계정에는 422(code=SOCIAL_ONLY_ACCOUNT) 반환.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                required: [account, tokens]
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          description: 인증 실패 (잘못된 자격증명·미존재·잠금 — 계정 열거 방지로 동일 포맷)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 계정 정지 (SUSPENDED 상태)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 소셜 전용 계정 (code=SOCIAL_ONLY_ACCOUNT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 액세스 토큰 갱신 (Refresh Token Rotation)
      operationId: refreshToken
      description: |
        유효한 리프레시 토큰으로 새 토큰 쌍을 발급한다.
        기존 리프레시 토큰은 즉시 무효화된다 (Rotation).
        이미 무효화된 토큰 재사용 감지 시 해당 family의 모든 세션 무효화.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: 리프레시 토큰 만료 또는 무효화됨 (재로그인 필요)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃 (현재 세션 무효화)
      operationId: logout
      description: 전달한 리프레시 토큰에 해당하는 세션만 무효화한다. 다른 기기 세션은 유지.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: 로그아웃 성공 (본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════════════════
  # SOCIAL AUTH — Public
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/social/{provider}/authorize:
    get:
      tags: [Auth - Social]
      summary: 소셜 로그인 인증 URL 발급
      operationId: socialAuthorize
      description: |
        provider의 OAuth 인증 페이지 URL과 CSRF 방지용 state를 반환한다.
        프론트엔드는 이 URL로 사용자를 리다이렉트하고, state를 저장해 콜백 시 함께 전달한다.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [kakao, google, apple]
          description: 소셜 provider 식별자
        - name: redirectUri
          in: query
          required: true
          schema:
            type: string
          description: OAuth 콜백 후 돌아올 클라이언트 URI
      responses:
        '200':
          description: 인증 URL 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialAuthorizeResponse'
        '400':
          description: 지원하지 않는 provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/social/{provider}/callback:
    post:
      tags: [Auth - Social]
      summary: 소셜 로그인 콜백 처리 (기존 로그인 or 신규 pending)
      operationId: socialCallback
      description: |
        provider로부터 받은 code와 state를 검증 후 기존/신규 분기.
        기존 유저: 200 isNew=false + account/tokens.
        신규 유저: 202 isNew=true + pendingToken(10분) + 전체 활성 약관 목록.
        code는 이 요청에서 소진됨. 신규 유저는 POST /complete로 가입 완료 필요.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [kakao, google, apple]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialCallbackRequest'
      responses:
        '200':
          description: 기존 소셜 계정 로그인 성공
          content:
            application/json:
              schema:
                type: object
                required: [isNew, account, tokens]
                properties:
                  isNew:
                    type: boolean
                    example: false
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '202':
          description: 신규 유저 — pending-signup 토큰 발급. POST /complete로 가입 완료 필요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPendingSignupResponse'
        '400':
          description: state 검증 실패 (CSRF 의심) 또는 허용되지 않은 redirectUri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 동일 이메일로 이메일 계정 이미 존재
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/social/complete:
    post:
      tags: [Auth - Social]
      summary: 소셜 신규 가입 완료 (약관 동의 + 계정 생성)
      operationId: socialComplete
      description: |
        pendingToken과 약관 동의를 검증 후 계정 생성 + JWT 발급.
        pendingToken TTL 10분. 필수 약관(SERVICE·PRIVACY) 미동의 또는 ageConfirmed=false 시 422.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialCompleteRequest'
      responses:
        '201':
          description: 계정 생성 + 로그인 성공
          content:
            application/json:
              schema:
                type: object
                required: [account, tokens]
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '400':
          description: pendingToken 만료 또는 서명 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 이메일 충돌 (동시 가입 경합)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 필수 약관 미동의 또는 연령 미확인
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # PASSWORD RESET — Public
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/password-reset/request:
    post:
      tags: [Auth - Password Reset]
      summary: 비밀번호 재설정 코드 발급 (1단계)
      operationId: passwordResetRequest
      description: |
        등록·미등록·소셜 전용 계정 이메일 모두 동일하게 202 반환 (계정 열거 방지).
        시간당 5회 초과 시 429. 이메일 서비스 장애 시 503 (한도 미차감).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '202':
          description: 처리 완료 (등록·미등록·소셜 전용 모두 동일 202)
        '429':
          description: 재전송 횟수 초과 (시간당 5회)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 이메일 서비스 장애
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/password-reset/verify:
    post:
      tags: [Auth - Password Reset]
      summary: 비밀번호 재설정 코드 검증 (2단계)
      operationId: passwordResetVerify
      description: |
        이메일로 받은 6자리 코드를 검증한다.
        성공 시 단일 사용 변경 허가 토큰 (TTL 10분) 반환.
        코드 만료 시 410, 오입력 401, 5회 초과 시 코드 무효화.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetVerifyRequest'
      responses:
        '200':
          description: 코드 검증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetVerifyResponse'
        '401':
          description: 잘못된 코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: 코드 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [Auth - Password Reset]
      summary: 새 비밀번호 설정 (3단계)
      operationId: passwordResetConfirm
      description: |
        변경 허가 토큰과 새 비밀번호로 비밀번호를 재설정한다.
        성공 시 해당 계정의 모든 리프레시 토큰 즉시 무효화.
        변경 허가 토큰은 단일 사용 — 재사용 시 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '204':
          description: 비밀번호 변경 완료 (본문 없음)
        '401':
          description: 변경 허가 토큰 무효·만료·재사용 시도
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 비밀번호 정책 미충족
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # EMAIL VERIFICATION — Authenticated (emailVerified=false 허용)
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/email-verification/request:
    post:
      tags: [Auth - Email Verification]
      summary: 이메일 인증 코드 재발송
      operationId: emailVerificationRequest
      description: |
        가입 이메일로 인증 코드를 재발송한다. 기존 미사용 코드는 즉시 무효화.
        시간당 5회 초과 시 429. 이미 인증된 계정 호출 시 422.
        이메일 서비스 장애 시 503 (한도 미차감).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequestBody'
      responses:
        '200':
          description: 코드 발송 처리 완료
        '422':
          description: 이미 인증 완료된 계정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 재전송 횟수 초과 (시간당 5회)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 이메일 서비스 장애
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/email-verification/verify:
    post:
      tags: [Auth - Email Verification]
      summary: 이메일 인증 코드 검증
      operationId: emailVerificationVerify
      description: |
        이메일로 받은 6자리 코드를 검증하고 계정을 '인증' 상태로 전환한다.
        코드 만료 시 410, 오입력 5회 초과 시 코드 무효화.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationVerifyRequest'
      responses:
        '200':
          description: 이메일 인증 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailVerified:
                    type: boolean
                    example: true
        '401':
          description: 잘못된 코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: 코드 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # ME — Authenticated + emailVerified=true
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/me:
    get:
      tags: [Me]
      summary: 내 계정 요약 조회
      operationId: getMe
      description: |
        현재 인증된 계정의 기본 정보를 반환한다.
        emailVerified=true 필수. 미인증 계정은 403 (code=EMAIL_NOT_VERIFIED).
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 이메일 미인증 (code=EMAIL_NOT_VERIFIED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me/profile:
    get:
      tags: [Me]
      summary: 프로필 조회
      operationId: getProfile
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Me]
      summary: 프로필 수정
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/me/interests:
    get:
      tags: [Me]
      summary: 관심 카테고리 조회
      operationId: getInterests
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInterests'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Me]
      summary: 관심 카테고리 수정 (최소 3개 유지)
