  # ═══════════════════════════════════════════════════════════════════════════
  # FEED & ARTICLES — Authenticated
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/articles:
    get:
      tags: [Feed]
      summary: 뉴스 피드 목록 조회
      operationId: getFeed
      description: |
        인증된 사용자가 최신순 뉴스 목록을 커서 기반으로 조회한다.
        노출 조건: `category_status ∈ {COMPLETED, FAILED}` AND `feed_visible=true`. PENDING 제외.
        정렬: `published_at DESC, id DESC`. 페이지 크기 기본 20, 최대 100.
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 이전 응답의 nextCursor 토큰. 첫 페이지 요청 시 생략.
          example: "eyJwdWJsaXNoZWRBdCI6IjIwMjYtMDYtMDlUMTI6MDA6MDBaIiwiaWQiOjEyM30"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: 페이지당 기사 수. 100 초과 요청은 100으로 clamp.
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Category'
          description: 카테고리 필터. 생략 시 전체 카테고리.
      responses:
        '200':
          description: 피드 목록 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleFeedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/articles/{id}:
    get:
      tags: [Articles]
      summary: 기사 상세 조회
      operationId: getArticle
      description: |
        기사 ID로 상세 정보와 세 가지 깊이의 요약 슬롯을 반환한다.
        DEEP 슬롯은 최초 상세 조회 시 lazy 생성 — 첫 요청에서 status=PENDING일 수 있음.
        기사가 존재하면 AI 오류와 무관하게 항상 200 반환.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 기사 ID
      responses:
        '200':
          description: 기사 상세 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN — ADMIN role only
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/admin/pipeline/stats:
    get:
      tags: [Admin]
      summary: 파이프라인 통계 조회
      operationId: getPipelineStats
      description: |
        오늘의 수집·처리 현황을 단일 호출로 확인한다. ADMIN 역할 전용.
        통계는 실시간 DB 집계 쿼리 (캐시 없음).
      responses:
        '200':
          description: 파이프라인 통계 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStatsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/terms:
    post:
      tags: [Admin]
      summary: 새 약관 버전 등록
      operationId: createTermsVersion
      description: |
        새 버전의 약관을 등록한다. 동일 type의 기존 is_active를 false로 전환.
        ADMIN 역할 전용. 미인증 401, USER 403.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTermsVersionRequest'
      responses:
        '201':
          description: 약관 버전 등록 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TermsVersion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 동일 type+version 이미 존재
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ═══════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Common ──────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      description: 공통 에러 응답
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          description: |
            애플리케이션 에러 코드. 주요 코드:
            - UNAUTHORIZED: 인증 토큰 없음·만료 (401)
            - FORBIDDEN: 권한 없음 (403)
            - EMAIL_NOT_VERIFIED: 이메일 미인증 (403)
            - EMAIL_ALREADY_EXISTS: 이메일 중복 (409)
            - SOCIAL_ONLY_ACCOUNT: 소셜 전용 계정 비밀번호 로그인 시도 (422)
            - ARTICLE_NOT_FOUND: 기사 ID 없음 (404)
            - VALIDATION_ERROR: 파라미터 형식·범위 오류 (400)
            - TOKEN_REUSED: 리프레시 토큰 재사용 감지 (401)
          example: UNAUTHORIZED
        message:
          type: string
          description: 사람이 읽을 수 있는 에러 설명
          example: Authentication required
        timestamp:
          type: string
          format: date-time
          example: '2026-06-14T10:00:00Z'
        details:
          type: array
          nullable: true
          description: Bean Validation 실패 등 상세 오류 목록
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string

    # ── Auth ────────────────────────────────────────────────────────────────
    TokenPair:
      type: object
      description: 인증 세션 토큰 쌍. 리프레시 토큰은 Rotation 적용 — 사용 시 교체됨.
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
          description: "JWT 액세스 토큰 (TTL 1h). claim: sub=accountId, role, emailVerified"
          example: eyJhbGciOiJIUzI1NiJ9...
        refreshToken:
          type: string
          description: 리프레시 토큰 (TTL 30d, 64자 hex)
          example: a1b2c3d4...
        expiresIn:
          type: integer
          description: 액세스 토큰 만료까지 남은 초
          example: 3600

    AccountSummary:
      type: object
      description: 현재 인증된 계정 요약 정보. /me 및 로그인 응답에서 공통 사용.
      required: [id, role, emailVerified, onboardingCompleted, signupType, createdAt, requiresReConsent]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
          description: 소셜 전용 계정은 null 가능
        role:
          type: string
          enum: [USER, ADMIN]
        emailVerified:
          type: boolean
        onboardingCompleted:
          type: boolean
        signupType:
          type: string
          enum: [EMAIL, SOCIAL]
        createdAt:
          type: string
          format: date-time
        requiresReConsent:
          type: boolean
          description: 현재 활성 필수 약관 중 미동의 버전 존재 여부. true이면 클라이언트가 재동의 UI를 표시해야 함.

    SignupRequest:
      type: object
      required: [email, password, consents, ageConfirmed]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          description: 영문·숫자 각 1자 이상, 8자 이상
          minLength: 8
          example: Password1
        consents:
          type: array
          description: 약관 동의 목록 (필수 약관 미동의 시 422)
          items:
            $ref: '#/components/schemas/ConsentInput'
        ageConfirmed:
          type: boolean
          description: 만 14세 이상 동의. false이면 422.
          example: true

    ConsentInput:
      type: object
      required: [termsVersionId, agreed]
      properties:
        termsVersionId:
          type: string
          format: uuid
        agreed:
          type: boolean

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: 현재 유효한 리프레시 토큰

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: 로그아웃할 세션의 리프레시 토큰 (해당 기기 세션만 무효화)

    SocialAuthorizeResponse:
      type: object
      required: [authorizeUrl]
      properties:
        authorizeUrl:
          type: string
          description: "provider 인증 페이지 URL (state JWT 포함). 프론트엔드가 이 URL로 리다이렉트. state는 URL 쿼리에 포함되어 있어 별도 반환하지 않음."

    SocialCallbackRequest:
      type: object
      required: [code, state, redirectUri]
      properties:
        code:
          type: string
          description: provider로부터 받은 authorization code
        state:
          type: string
          description: CSRF 방지용 state (백엔드 발급값)
        redirectUri:
          type: string
          description: 인증 요청 시 사용한 redirect URI (서버 화이트리스트에 등록된 값)
        userJson:
          type: string
          nullable: true
          description: "Apple 최초 로그인 시 provider가 form_post로 전달하는 userInfo JSON. 이후 로그인에서는 생략."

    SocialPendingSignupResponse:
      type: object
      description: 신규 소셜 유저 — 약관 동의 전 pending 상태. POST /auth/social/complete로 가입 완료 필요.
      required: [isNew, pendingToken, requiredTerms]
      properties:
        isNew:
          type: boolean
          example: true
        pendingToken:
          type: string
          description: "소셜 신원(provider·식별자·이메일)을 담은 단기 JWT (TTL 10분). 서명 검증 후 /complete에서 소비."
        requiredTerms:
          type: array
          description: 유저에게 동의받아야 할 활성 약관 목록 (required·optional 모두 포함)
          items:
            $ref: '#/components/schemas/TermsVersion'

    SocialCompleteRequest:
      type: object
      description: 소셜 신규 가입 완료 요청
      required: [pendingToken, consents, ageConfirmed]
      properties:
        pendingToken:
          type: string
          description: 콜백 202 응답에서 받은 pending-signup 토큰 (TTL 10분)
        consents:
          type: array
          description: 약관 동의 목록 (필수 약관 SERVICE·PRIVACY agreed=true 포함 필수)
          minItems: 1
          items:
            $ref: '#/components/schemas/ConsentInput'
        ageConfirmed:
          type: boolean
          description: 만 14세 이상 동의 여부 (true 필수)

    # ── Password Reset ───────────────────────────────────────────────────────
    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: '^\d{6}$'
          example: '123456'

    PasswordResetVerifyResponse:
      type: object
      required: [resetToken]
      properties:
        resetToken:
          type: string
          description: 비밀번호 변경 허가 토큰 (단일 사용, TTL 10분)

    PasswordResetConfirmRequest:
      type: object
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
          description: 새 비밀번호 (영문·숫자 각 1자 이상, 8자 이상)
          minLength: 8

    # ── Email Verification ───────────────────────────────────────────────────
    EmailVerificationRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerificationVerifyRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: '^\d{6}$'
          example: '654321'

    # ── Profile & Preferences ────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        nickname:
          type: string
          maxLength: 50
          nullable: true
        ageGroup:
          type: string
          enum: [TEENS, TWENTIES, THIRTIES, FORTIES, FIFTIES_PLUS]
          nullable: true
        occupation:
          type: string
          maxLength: 100
          nullable: true

    UserInterests:
      type: object
      required: [categories]
      properties:
        categories:
          type: array
          description: 관심 카테고리 목록. 최소 3개 유지 필수.
          minItems: 3
          items:
            $ref: '#/components/schemas/Category'

    FollowKeywordsRequest:
      type: object
      required: [keywords]
      properties:
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/FollowKeywordItem'

    FollowKeywordItem:
      type: object
      required: [keyword, type]
      properties:
        keyword:
          type: string
          maxLength: 100
        type:
          type: string
          enum: [COMPANY, THEME, PERSON]

    ReadingPreference:
      type: object
      required: [summaryDepth, consumeMode]
      properties:
        summaryDepth:
          type: string
          enum: [BRIEF, BALANCED, DEEP]
          description: "요약 깊이 (기본값: BALANCED)"
        consumeMode:
          type: string
          enum: [READ, LISTEN, BOTH]
          description: "소비 방식 (기본값: READ)"

    BriefingSettings:
      type: object
      required: [briefingTime, timezoneOffset, voiceEnabled, pushAgreed]
      properties:
        briefingTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 브리핑 시간 HH:MM (로컬 기준)
          example: '08:00'
        timezoneOffset:
          type: integer
          description: UTC 오프셋(분). KST=540, UTC=0
          example: 540
        voiceEnabled:
          type: boolean
        pushAgreed:
          type: boolean
          description: 푸시 알림 동의. true 설정 시 동의 시각이 기록됨.

    OnboardingRequest:
      type: object
      required: [interests]
      description: 온보딩 전체 데이터 일괄 저장 요청
      properties:
        profile:
          $ref: '#/components/schemas/UserProfile'
        interests:
          $ref: '#/components/schemas/UserInterests'
        keywords:
          $ref: '#/components/schemas/FollowKeywordsRequest'
        readingPreference:
          $ref: '#/components/schemas/ReadingPreference'
        briefingSettings:
          $ref: '#/components/schemas/BriefingSettings'

    OnboardingStatus:
      type: object
      required: [completed, interestCount, personalizationActive]
      properties:
        completed:
          type: boolean
        interestCount:
          type: integer
          description: 현재 선택된 관심 카테고리 수
        personalizationActive:
          type: boolean
          description: 관심 카테고리 3개 이상 선택 시 true

    # ── Terms ────────────────────────────────────────────────────────────────
    TermsVersion:
      type: object
      required: [id, type, version, effectiveDate, isRequired, isActive]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [SERVICE, PRIVACY, MARKETING]
        version:
          type: string
          example: '1.0'
        effectiveDate:
          type: string
          format: date
          example: '2026-06-01'
        isRequired:
          type: boolean
        isActive:
          type: boolean

    ConsentRecord:
      type: object
      required: [termsVersionId, type, version, agreed, agreedAt]
      properties:
        termsVersionId:
          type: string
          format: uuid
        type:
          type: string
          enum: [SERVICE, PRIVACY, MARKETING]
        version:
          type: string
        agreed:
          type: boolean
        agreedAt:
          type: string
          format: date-time

    CreateTermsVersionRequest:
      type: object
      required: [type, version, effectiveDate, isRequired]
      properties:
        type:
          type: string
          enum: [SERVICE, PRIVACY, MARKETING]
        version:
          type: string
          example: '2.0'
        effectiveDate:
          type: string
          format: date
        isRequired:
          type: boolean

    # ── Feed & Articles ──────────────────────────────────────────────────────
    Category:
      type: string
      enum:
        - ECONOMY_FINANCE
        - SCIENCE
        - POLITICS
        - SPORTS
        - WORLD
        - ENTERTAINMENT_CULTURE
        - HEALTH_MEDICINE
        - AUTOMOTIVE
        - IT
        - OTHER
      description: |
        기사 카테고리. 표시명:
        ECONOMY_FINANCE=경제·금융, SCIENCE=과학, POLITICS=정치, SPORTS=스포츠,
        WORLD=세계, ENTERTAINMENT_CULTURE=연예·문화, HEALTH_MEDICINE=건강·의학,
        AUTOMOTIVE=자동차, IT=IT, OTHER=기타.

    ProcessingStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED]

    SummarySlotStatus:
      type: string
      enum: [NOT_GENERATED, PENDING, COMPLETED, FAILED]

    ArticleFeedItem:
      type: object
      required: [id, title, category, categoryStatus, primarySource, publishedAt, summaryStatus]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        category:
          $ref: '#/components/schemas/Category'
          description: "category_status=FAILED인 경우 OTHER로 반환"
        categoryStatus:
          $ref: '#/components/schemas/ProcessingStatus'
        primarySource:
          type: string
          description: 첫 번째 수집 출처명
        publishedAt:
          type: string
          format: date-time
          description: 원 출처 발행 시각 (UTC)
        preview:
          type: string
          nullable: true
          description: "balanced 요약 미리보기 (목록용). PENDING/FAILED 시 null."
        summaryStatus:
          $ref: '#/components/schemas/ProcessingStatus'

    ArticleFeedResponse:
      type: object
      required: [data, hasMore, size]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ArticleFeedItem'
        nextCursor:
          type: string
          nullable: true
          description: 다음 페이지 커서 토큰. 마지막 페이지면 null.
        hasMore:
          type: boolean
        size:
          type: integer
          description: 실제 반환된 기사 수

    SummarySlot:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/SummarySlotStatus'
        content:
          type: string
          nullable: true
          description: status=COMPLETED 시에만 존재
        generatedAt:
          type: string
          format: date-time
          nullable: true
          description: status=COMPLETED 시에만 존재 (UTC)

    ArticleSourceRef:
      type: object
      required: [name, collectedAt]
      properties:
        name:
          type: string
          description: 출처명
        collectedAt:
          type: string
          format: date-time
          description: 해당 출처에서 수집한 시각 (UTC)

    ArticleDetailResponse:
      type: object
      required: [id, title, category, categoryStatus, publishedAt, collectedAt, originalUrl, sources, summaries, aiDisclaimer]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        author:
          type: string
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
          description: "category_status=FAILED인 경우 OTHER로 반환"
        categoryStatus:
          $ref: '#/components/schemas/ProcessingStatus'
        publishedAt:
          type: string
          format: date-time
        collectedAt:
          type: string
          format: date-time
        originalUrl:
          type: string
          format: uri
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ArticleSourceRef'
        summaries:
          type: object
          required: [brief, balanced, deep]
          properties:
            brief:
              $ref: '#/components/schemas/SummarySlot'
            balanced:
              $ref: '#/components/schemas/SummarySlot'
            deep:
              $ref: '#/components/schemas/SummarySlot'
        aiDisclaimer:
          type: string
          description: AI 생성 요약 면책 안내 문구
        expiresAt:
          type: string
          format: date-time
          nullable: true

    PipelineStatsResponse:
      type: object
      required: [date, articlesCollectedToday, summaryCompletionRate, mergeCount, categoryBreakdown, pipelineStatus]
      properties:
        date:
          type: string
          format: date
          description: 통계 기준일 (오늘, UTC)
        articlesCollectedToday:
          type: integer
        summaryCompletionRate:
          type: number
          format: float
          description: 오늘 수집 기사 중 summary_status=COMPLETED 비율 (%)
        mergeCount:
          type: integer
          description: 오늘 병합 처리된 건수
        categoryBreakdown:
          type: object
          additionalProperties:
            type: integer
          description: 노출 기사 기준 카테고리별 건수. FAILED 기사는 OTHER로 계산.
        pipelineStatus:
          type: object
          required: [categoryPending, categoryFailed, summaryPending, summaryFailed]
          properties:
            categoryPending:
              type: integer
            categoryFailed:
              type: integer
            summaryPending:
              type: integer
            summaryFailed:
              type: integer

  responses:
    BadRequest:
      description: 잘못된 요청 (파라미터 오류)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: Invalid request parameters
            timestamp: '2026-06-14T10:00:00Z'

    Unauthorized:
      description: 인증 토큰 없음 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: Authentication required
            timestamp: '2026-06-14T10:00:00Z'

    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: Admin role required
            timestamp: '2026-06-14T10:00:00Z'

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: ARTICLE_NOT_FOUND
            message: Article with id 999 not found
            timestamp: '2026-06-14T10:00:00Z'

    UnprocessableEntity:
      description: 유효성 검사 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
