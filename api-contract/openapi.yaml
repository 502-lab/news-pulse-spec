        required: false
        schema:
          type: "string"
      - name: "actorId"
        in: "query"
        description: "행위자 계정 필터"
        required: false
        schema:
          type: "string"
          format: "uuid"
      - name: "from"
        in: "query"
        description: "시작 시각(ISO)"
        required: false
        schema:
          type: "string"
          format: "date-time"
      - name: "to"
        in: "query"
        description: "종료 시각(ISO)"
        required: false
        schema:
          type: "string"
          format: "date-time"
      - name: "pageable"
        in: "query"
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: "성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePageAuditLogItemResponse"
