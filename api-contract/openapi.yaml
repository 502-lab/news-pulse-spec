openapi: "3.1.0"
info:
  title: "OpenAPI definition"
  version: "v0"
servers:
- url: "http://localhost:41957"
  description: "Generated server url"
tags:
- name: "Onboarding"
  description: "사용자 온보딩 — 프로필·관심사·설정 일괄 저장"
- name: "Topic Subscriptions"
  description: "알림 토픽 구독 조회·교체"
- name: "Read Tracking"
  description: "내 읽은수·조회 이력 API (009)"
- name: "Admin"
  description: "관리자 전용 API. 추후 ROLE_ADMIN 인증 적용 예정 (spec 002)"
- name: "TTS"
  description: "기사 TTS 생성 및 상태 조회"
- name: "Admin Ops"
  description: "어드민 수집·콘텐츠 운영 제어 API (ADMIN 전용)"
- name: "Bias"
  description: "편향 분석 점수·집계 조회 API"
- name: "Notifications"
  description: "인앱 알림 조회·읽음 처리 API"
- name: "Saved Articles"
  description: "기사 저장 / 해제 / 목록 조회"
- name: "Briefing"
  description: "데일리 브리핑 TTS — 오늘의 뉴스 N건 음성 재생 큐"
- name: "Trends"
  description: "트렌드 조회 API (공개)"
- name: "Admin Ops Stats"
  description: "어드민 심층 통계/감사 조회 API (ADMIN 전용, 읽기 전용)"
- name: "Admin Notifications"
  description: "어드민 알림 수동 발송 API"
- name: "Search"
  description: "기사 전문 검색 (pg_bigm 한국어 지원)"
- name: "Terms"
  description: "약관 버전 관리 및 동의 이력"
- name: "Voice"
  description: "음성 캐릭터 목록 조회"
- name: "Password Reset"
  description: "비밀번호 재설정 3단계 흐름 (모두 인증 불필요)"
- name: "Notices"
  description: "공개 공지 조회 API"
- name: "Feed"
  description: "개인화 뉴스 피드"
- name: "Me"
  description: "인증된 사용자 본인 정보 조회·수정"
- name: "Admin Monitoring"
  description: "어드민 운영 모니터링 조회 API (ADMIN 전용, 읽기 전용)"
- name: "Device Tokens"
  description: "FCM 디바이스 토큰 등록·삭제"
- name: "Insights"
  description: "개인 소비 인사이트·놓친 기사 추천 API (010)"
- name: "Admin Notices"
  description: "어드민 공지/푸시 API (ADMIN 전용)"
- name: "Notification Settings"
  description: "알림 설정 및 이메일 구독 관리 API"
- name: "Article Detail"
  description: "기사 상세 조회 API"
- name: "Article Feed"
  description: "뉴스 피드 목록 조회 API"
- name: "Social Auth"
  description: "소셜 OAuth 인증 (Kakao / Google / Apple)"
- name: "Admin Users"
  description: "어드민 사용자 관리 API (ADMIN 전용)"
paths:
  /api/v1/me/topic-subscriptions:
    get:
      tags:
      - "Topic Subscriptions"
      summary: "토픽 구독 목록 조회"
      description: "현재 사용자의 알림 토픽 구독 목록을 반환한다."
      operationId: "getTopics"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSubscriptionsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSubscriptionsResponse"
    put:
      tags:
      - "Topic Subscriptions"
      summary: "토픽 구독 교체 (replace-all)"
      description: "기존 구독 목록을 전부 삭제하고 전달된 토픽 목록으로 교체한다. 빈 목록 전달 시 전체 구독 해제."
      operationId: "replaceTopics"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicSubscriptionsRequest"
        required: true
      responses:
        "200":
          description: "교체 완료"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSubscriptionsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSubscriptionsResponse"
        "422":
          description: "요청 본문 유효성 오류"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSubscriptionsResponse"
  /api/v1/me/reading-preference:
    get:
      tags:
      - "Me"
      summary: "읽기 방식 조회"
      operationId: "getReadingPreference"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReadingPreferenceResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReadingPreferenceResponse"
    put:
      tags:
      - "Me"
      summary: "읽기 방식 수정"
      operationId: "updateReadingPreference"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadingPreferenceRequest"
        required: true
      responses:
        "200":
          description: "수정 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReadingPreferenceResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReadingPreferenceResponse"
  /api/v1/me/profile:
    get:
      tags:
      - "Me"
      summary: "프로필 조회"
      operationId: "getProfile"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserProfileResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserProfileResponse"
    put:
      tags:
      - "Me"
      summary: "프로필 수정"
      operationId: "updateProfile"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileRequest"
        required: true
      responses:
        "200":
          description: "수정 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserProfileResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserProfileResponse"
  /api/v1/me/notification-settings:
    get:
      tags:
      - "Notification Settings"
      summary: "알림 설정 조회"
      description: "현재 계정의 알림 채널별 수신 설정을 반환한다. DB에 저장된 값이 없으면 기본값(전부 true)을 반환한다."
      operationId: "getSettings"
      responses:
        "200":
          description: "성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseNotificationSettingsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseNotificationSettingsResponse"
    put:
      tags:
      - "Notification Settings"
      summary: "알림 설정 변경"
      description: "알림 채널별(push/email/rising/bias) 수신 여부를 업서트한다."
      operationId: "updateSettings"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsRequest"
        required: true
      responses:
        "200":
          description: "성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseNotificationSettingsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseNotificationSettingsResponse"
  /api/v1/me/keywords:
    get:
      tags:
      - "Me"
      summary: "팔로우 키워드 조회"
      operationId: "getKeywords"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFollowKeywordsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFollowKeywordsResponse"
    put:
      tags:
      - "Me"
      summary: "팔로우 키워드 수정 (전체 교체)"
      operationId: "updateKeywords"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowKeywordsRequest"
        required: true
      responses:
        "200":
          description: "수정 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFollowKeywordsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFollowKeywordsResponse"
  /api/v1/me/interests:
    get:
      tags:
      - "Me"
      summary: "관심사 조회"
      operationId: "getInterests"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserInterestsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserInterestsResponse"
    put:
      tags:
      - "Me"
      summary: "관심사 수정 (최소 3개)"
      description: "3개 미만 제출 시 422를 반환합니다."
      operationId: "updateInterests"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInterestsRequest"
        required: true
      responses:
        "200":
          description: "수정 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserInterestsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserInterestsResponse"
        "422":
          description: "카테고리 3개 미만"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserInterestsResponse"
  /api/v1/me/briefing-settings:
    get:
      tags:
      - "Me"
      summary: "브리핑 설정 조회"
      operationId: "getBriefingSettings"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseBriefingSettingsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseBriefingSettingsResponse"
    put:
      tags:
      - "Me"
      summary: "브리핑 설정 수정"
      operationId: "updateBriefingSettings"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BriefingSettingsRequest"
        required: true
      responses:
        "200":
          description: "수정 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseBriefingSettingsResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseBriefingSettingsResponse"
  /api/v1/admin/notices/{id}:
    put:
      tags:
      - "Admin Notices"
      summary: "공지 수정"
      operationId: "update"
      parameters:
      - name: "id"
        in: "path"
        required: true
        schema:
          type: "integer"
          format: "int64"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeUpdateRequest"
        required: true
      responses:
        "200":
          description: "성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseNoticeResponse"
        "404":
          description: "공지 없음"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseNoticeResponse"
    delete:
      tags:
      - "Admin Notices"
      summary: "공지 삭제"
      operationId: "delete"
      parameters:
      - name: "id"
        in: "path"
        required: true
        schema:
          type: "integer"
          format: "int64"
      responses:
        "200":
          description: "성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "404":
          description: "공지 없음"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/v1/me/subscriptions/weekly-email:
    post:
      tags:
      - "Notification Settings"
      summary: "주간 이메일 구독"
      description: "매주 월요일 발송되는 AI 뉴스 브리핑 주간 이메일을 구독한다. 이미 구독 중이면 409를 반환한다."
      operationId: "subscribeWeeklyEmail"
      responses:
        "201":
          description: "구독 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseEmailSubscriptionResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseEmailSubscriptionResponse"
        "409":
          description: "이미 구독 중"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseEmailSubscriptionResponse"
    delete:
      tags:
      - "Notification Settings"
      summary: "주간 이메일 구독 해제"
      description: "주간 이메일 구독을 해제한다. 구독 중이 아니면 404를 반환한다."
      operationId: "unsubscribeWeeklyEmail"
      responses:
        "204":
          description: "구독 해제 성공"
        "401":
          description: "미인증"
        "404":
          description: "구독 미존재"
  /api/v1/me/onboarding:
    post:
      tags:
      - "Onboarding"
      summary: "온보딩 제출"
      description: "프로필·관심사(최소 3개)·키워드·읽기방식·브리핑 설정을 일괄 저장합니다. 관심 카테고리 3개 이상이면 personalizationActive=true로\
        \ 전환됩니다."
      operationId: "submitOnboarding"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
        required: true
      responses:
        "200":
          description: "온보딩 저장 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "422":
          description: "관심 카테고리 3개 미만"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/v1/me/device-tokens:
    post:
      tags:
      - "Device Tokens"
      summary: "디바이스 토큰 등록"
      description: "FCM 디바이스 토큰을 등록한다. 동일 token이 이미 존재하면 account_id·platform·updated_at을\
        \ 갱신(upsert). 계정당 최대 5개 — 초과 시 가장 오래된 토큰이 자동 삭제된다."
      operationId: "register"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceTokenRequest"
        required: true
      responses:
        "201":
          description: "등록 완료 (upsert)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDeviceTokenResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDeviceTokenResponse"
        "422":
          description: "요청 본문 유효성 오류"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDeviceTokenResponse"
  /api/v1/me/consents:
    get:
      tags:
      - "Terms"
      summary: "내 동의 이력 조회"
      description: "인증된 사용자의 모든 약관 동의 기록을 반환합니다."
      operationId: "getConsentHistory"
      responses:
        "200":
          description: "조회 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListConsentRecordResponse"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListConsentRecordResponse"
    post:
      tags:
      - "Terms"
      summary: "약관 재동의 제출 (멱등)"
      description: "이미 동의한 버전은 무시합니다(멱등). 새로운 버전에 대한 동의만 저장됩니다."
      operationId: "submitConsents"
      requestBody:
        content:
          application/json:
            schema:
              type: "array"
              items:
                $ref: "#/components/schemas/ConsentInput"
        required: true
      responses:
        "200":
          description: "동의 처리 완료"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          description: "미인증"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/v1/auth/social/{provider}/callback:
    post:
      tags:
      - "Social Auth"
      summary: "OAuth 콜백 처리"
      description: "provider에서 받은 code와 state를 검증 후 기존/신규 분기. 기존 유저: 200 + account/tokens.\
        \ 신규 유저: 202 + pendingToken(10분) + 전체 활성 약관 목록(requiredTerms). code는 여기서 소\
        진됨. 가입 완료는 POST /complete 호출 필요."
      operationId: "callback"
      parameters:
      - name: "provider"
        in: "path"
        description: "OAuth provider (kakao / google / apple)"
        required: true
        schema:
          type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialCallbackRequest"
        required: true
      responses:
        "200":
          description: "기존 소셜 계정 로그인"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
        "202":
          description: "신규 유저 — pendingToken 발급. POST /complete로 가입 완료 필요"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
        "400":
          description: "state 유효하지 않음 (위조/만료/provider 불일치)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
        "409":
          description: "동일 이메일 계정 이미 존재"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
  /api/v1/auth/social/complete:
    post:
      tags:
      - "Social Auth"
      summary: "소셜 신규 가입 완료"
      description: "pendingToken과 약관 동의를 검증 후 계정 생성 + JWT 발급. pendingToken TTL 10분\
        . 필수 약관(SERVICE·PRIVACY) 미동의 또는 ageConfirmed=false 시 422."
      operationId: "complete"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialCompleteRequest"
        required: true
      responses:
        "201":
          description: "계정 생성 + 로그인 성공"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
        "400":
          description: "pendingToken 만료 또는 서명 오류"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
        "409":
          description: "이메일 충돌 (동시 가입 경합)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
        "422":
          description: "필수 약관 미동의 또는 연령 미확인"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
  /api/v1/auth/signup:
    post:
      tags:
