          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "409":
          description: "기사 요약 미완료 (SUMMARY_NOT_READY)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
        "422":
          description: "유효하지 않은 voiceId"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTtsStatusResponse"
