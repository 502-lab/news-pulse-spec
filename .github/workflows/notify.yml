# todo-spec/.github/workflows/notify.yml
name: Notify on spec change

on:
  push:
    branches: [main]
    paths:
      - "api-contract/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Frontend
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_TOKEN }}
          repository: your-org/todo-frontend
          event-type: spec-updated

      - name: Notify Android
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_TOKEN }}
          repository: your-org/todo-android
          event-type: spec-updated
